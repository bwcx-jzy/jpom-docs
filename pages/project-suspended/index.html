  </div> <div class="theme-vdoing-content content__default"><h2 id="重要通知"><a href="#重要通知" class="header-anchor">#</a> 重要通知</h2> <p>我们遗憾地通知您，Jpom 项目将<strong>暂停维护</strong>。</p> <h2 id="项目回顾"><a href="#项目回顾" class="header-anchor">#</a> 项目回顾</h2> <p>Jpom 从 2017 年诞生，2018 年正式开源，2019 年发布第一个版本，至今已迭代 150+ 版本。</p> <p>作为一款简而轻的低侵入式在线构建、自动部署、日常运维、项目运维监控软件，Jpom 自开源以来得到了大量用户的认同、安装使用和支持。</p> <p>在此，我们向所有曾经支持、使用、反馈、贡献过 Jpom 的朋友们表示<strong>最衷心的感谢</strong>！</p> <h2 id="暂停维护原因"><a href="#暂停维护原因" class="header-anchor">#</a> 暂停维护原因</h2> <blockquote><p><strong>⚠️ 关于暂停维护的说明</strong></p> <p>这是一个艰难的决定，需要向大家坦诚地说明原因：</p> <p><strong>1. 长期个人维护的局限性</strong></p> <p>Jpom 从开源至今，<strong>长期由作者个人维护</strong>。目前版本 80%+ 的功能由作者本人设计、开发、维护、测试、运营。开源这几年，一直是作者在&quot;为爱发电&quot;，独自承担着项目的几乎所有工作。</p> <p><strong>2. 贡献者难以持续参与</strong></p> <p>虽然项目发展过程中<strong>有很多贡献者参与</strong>，但由于各种原因（工作变动、生活压力、精力分散等），大家都<strong>不能长期坚持</strong>下来，导致项目始终无法形成稳定的核心维护团队。</p> <p><strong>3. 作者自身的不足</strong></p> <p>作为项目的创始人，<strong>作者也有很多没有做到位的地方</strong>。无论是在社区运营、文档完善、问题响应，还是在代码质量、功能规划等方面，都存在诸多不足，这些不足也让项目的发展受到了限制。</p> <p><strong>4. 精力限制</strong></p> <p>随着生活琐事的增多，<strong>作者的精力变得更加有限</strong>。开源项目需要投入大量的时间和精力，而个人能力、时间、资源都是有限的，很难在兼顾生活的同时继续维持项目的正常发展。</p> <p><strong>5. 运营成本</strong></p> <p>项目的持续运营也产生了一定的成本，包括：</p> <ul><li>阿里云 CDN</li> <li>阿里云 OSS</li> <li>鉴权中心服务器</li> <li>演示站点服务</li></ul> <p>这些成本长期由作者个人承担，也带来了一定的压力。</p></blockquote> <h2 id="继续使用与贡献"><a href="#继续使用与贡献" class="header-anchor">#</a> 继续使用与贡献</h2> <blockquote><p><strong>欢迎继续使用</strong></p> <p>虽然项目暂停维护，但<strong>欢迎大家继续使用 Jpom</strong>。</p> <p>目前虽然存在部分小的待优化点，但仍然有<strong>很多用户长期坚持使用 Jpom</strong>，说明其在实际场景中仍然具有使用价值。</p> <p>同时，如果您愿意为 Jpom 贡献代码，<strong>我们依然乐意审查并合并您的 PR</strong>。社区的力量是开源项目最宝贵的财富。</p></blockquote> <h2 id="关于未来"><a href="#关于未来" class="header-anchor">#</a> 关于未来</h2> <p>虽然当前决定暂停维护，但作者并没有完全放弃这个项目。</p> <p><strong>作者一直在考虑做商业版，或者重构做一个新版本</strong>，这个想法一直没有想好，还在酝酿中。如果未来条件成熟，可能会以新的形式回归。</p> <p>至于何时能恢复维护，<strong>只能等作者心跳恢复后再考虑是否继续维护</strong>。</p> <h2 id="合作与反馈"><a href="#合作与反馈" class="header-anchor">#</a> 合作与反馈</h2> <p>如果您对 Jpom 的未来发展有想法，我们非常欢迎您的反馈和建议：</p> <blockquote><p><strong>期待您的声音</strong></p> <ul><li><strong>更好的建议</strong>：如果您对项目发展有好的想法和建议</li> <li><strong>接手维护</strong>：如果您愿意接手继续维护 Jpom 项目</li> <li><strong>商业计划</strong>：如果您有商业化的合作方案</li> <li><strong>赞赏支持</strong>：如果您愿意提供赞赏或其他形式的支持</li> <li><strong>合作方案</strong>：如果您有明确的合作方案</li></ul> <p>以上任何一种情况，都欢迎通过下方联系方式与我们取得联系，我们非常期待与您交流。</p></blockquote> <h2 id="留言反馈"><a href="#留言反馈" class="header-anchor">#</a> 留言反馈</h2> <blockquote><p><strong>Jpom 留言反馈表单</strong></p> <p>如有任何建议、意见或合作意向，欢迎通过以下表单留言：</p> <p><a href="https://f.wps.cn/g/5z7N5Mjp/" target="_blank" rel="noopener noreferrer">邀你填写「Jpom 留言反馈表单」<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></blockquote> <h2 id="致歉与感谢"><a href="#致歉与感谢" class="header-anchor">#</a> 致歉与感谢</h2> <p>感谢大家的包容与理解，如有不足之处，敬请谅解。</p> <p>感谢所有一路支持 Jpom 的朋友们，感谢大家的理解、包容和支持。</p> <p>开源不易，感谢相伴。</p> <hr></div></div> <div class="page-slot page-slot-bottom">
